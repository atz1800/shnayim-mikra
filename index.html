<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ═══ DATA ════════════════════════════════════════════ */
const SFARIM = [
  { id: 'bereshit', name: 'בראשית', color: '#1e4fa0', parshiot: [
    'בראשית','נח','לך לך','וירא','חיי שרה','תולדות','ויצא','וישלח','וישב','מקץ','ויגש','ויחי'
  ]},
  { id: 'shemot', name: 'שמות', color: '#1a6b45', parshiot: [
    'שמות','וארא','בא','בשלח','יתרו','משפטים','תרומה','תצוה','כי תשא','ויקהל','פקודי'
  ]},
  { id: 'vayikra', name: 'ויקרא', color: '#8b2020', parshiot: [
    'ויקרא','צו','שמיני','תזריע','מצורע','אחרי מות','קדושים','אמור','בהר','בחוקותי'
  ]},
  { id: 'bamidbar', name: 'במדבר', color: '#6b3d9e', parshiot: [
    'במדבר','נשא','בהעלותך','שלח','קרח','חוקת','בלק','פינחס','מטות','מסעי'
  ]},
  { id: 'devarim', name: 'דברים', color: '#a0610a', parshiot: [
    'דברים','ואתחנן','עקב','ראה','שופטים','כי תצא','כי תבוא','נצבים','וילך','האזינו','וזאת הברכה'
  ]},
];

const ALIYA_LABELS = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שביעי'];

/* ═══ HELPERS ════════════════════════════════════════ */
function getHebrewYear() {
  try { return new window.hebcal.HDate(new Date()).getFullYear(); }
  catch { return 5786; }
}

function yearStr(y) {
  const m = {5783:'תשפ"ג',5784:'תשפ"ד',5785:'תשפ"ה',5786:'תשפ"ו',5787:'תשפ"ז',5788:'תשפ"ח'};
  return m[y] || String(y);
}

function detectCurrentParasha() {
  try {
    const { HebrewCalendar } = window.hebcal;
    const now = new Date();
    const events = HebrewCalendar.calendar({
      start: now, end: new Date(now.getTime() + 8 * 86400000),
      noHolidays: true, sedrot: true, il: false
    });
    for (const ev of events) {
      const r = ev.render ? ev.render('he') : '';
      if (r.startsWith('פרשת')) {
        const name = r.replace('פרשת ', '').trim();
        for (const s of SFARIM) {
          if (s.parshiot.includes(name)) return name;
        }
        // try to match without nikud differences
        for (const s of SFARIM) {
          const found = s.parshiot.find(p => p === name || name.includes(p) || p.includes(name));
          if (found) return found;
        }
      }
    }
  } catch {}
  return null;
}

function aliyaDone(a) {
  if (!a) return 0;
  return (a.m1 ? 1 : 0) + (a.m2 ? 1 : 0) + (a.t ? 1 : 0);
}

function parshaStats(prog, name) {
  let done = 0;
  for (let i = 1; i <= 7; i++) done += aliyaDone((prog[name] || {})[i]);
  return { done, total: 21 };
}

function seferStats(prog, sefer) {
  let done = 0;
  for (const p of sefer.parshiot) done += parshaStats(prog, p).done;
  return { done, total: sefer.parshiot.length * 21 };
}

function globalStats(prog) {
  let m1 = 0, m2 = 0, t = 0, complete = 0, missing = 0;
  for (const s of SFARIM) {
    for (const name of s.parshiot) {
      let allDone = true;
      for (let i = 1; i <= 7; i++) {
        const a = (prog[name] || {})[i] || {};
        if (a.m1) m1++;
        if (a.m2) m2++;
        if (a.t) t++;
        if (!a.m1 || !a.m2 || !a.t) allDone = false;
      }
      if (allDone) complete++; else missing++;
    }
  }
  return { m1, m2, t, complete, missing, total: 54 };
}

/* ═══ FIREBASE ══════════════════════════════════════ */
async function fbSave(uid, prog) {
  try {
    const { db, doc, setDoc } = window._fb;
    await setDoc(doc(db, 'users', uid), { 'mikra-progress': JSON.stringify(prog) }, { merge: true });
  } catch(e) { console.error('mikra save error', e); }
}

async function fbLoad(uid) {
  try {
    const { db, doc, getDoc } = window._fb;
    const snap = await getDoc(doc(db, 'users', uid));
    if (snap.exists()) {
      const raw = snap.data()['mikra-progress'];
      return raw ? JSON.parse(raw) : {};
    }
    return {};
  } catch(e) {
    console.error('mikra load error', e);
    if (e.code === 'permission-denied') alert('⚠️ Firebase: אין הרשאה לקרוא נתונים. עדכן כללי Firestore.');
    return null;
  }
}

/* ═══ COMPONENTS ════════════════════════════════════ */

function AliyotPanel({ name, seferColor, prog, onToggle, onBulk }) {
  return (
    <div className="aliyot-panel" style={{'--sc': seferColor}}>
      <div className="panel-actions">
        <button className="pa-btn m1" onClick={() => onBulk(name, 'm1', true)}>✓ כל מ״א</button>
        <button className="pa-btn m2" onClick={() => onBulk(name, 'm2', true)}>✓ כל מ״ב</button>
        <button className="pa-btn targ" onClick={() => onBulk(name, 't', true)}>✓ כל תרגום</button>
        <button className="pa-btn clr" onClick={() => onBulk(name, null, false)}>× נקה</button>
      </div>
      {ALIYA_LABELS.map((label, idx) => {
        const num = idx + 1;
        const a = (prog[name] || {})[num] || {};
        const lvl = aliyaDone(a);
        const isMissing = !a.m1 || !a.m2 || !a.t;
        return (
          <div className={`aliya-row${isMissing ? ' missing' : ''}`} key={num}>
            <span className="aliya-num">{num}</span>
            <span className="aliya-label">{label}</span>
            <div className="aliya-btns">
              <button className={`a-btn m1 ${a.m1 ? 'on' : 'off'}`} onClick={() => onToggle(name, num, 'm1')}>מ״א</button>
              <button className={`a-btn m2 ${a.m2 ? 'on' : 'off'}`} onClick={() => onToggle(name, num, 'm2')}>מ״ב</button>
              <button className={`a-btn t ${a.t ? 'on' : 'off'}`} onClick={() => onToggle(name, num, 't')}>ת׳</button>
            </div>
            {lvl === 3 && <span className="aliya-check">✓</span>}
          </div>
        );
      })}
    </div>
  );
}

function ParshaCard({ name, seferColor, prog, isCurrent, isExpanded, filterMissing, onExpand, onToggle, onBulk }) {
  const { done, total } = parshaStats(prog, name);
  const pct = Math.round(done / total * 100);
  const isComplete = done === total;
  const hasMissing = done > 0 && !isComplete;
  const dotLevel = i => {
    const a = (prog[name] || {})[i] || {};
    return aliyaDone(a);
  };
  const barColor = isComplete ? '#c4922a' : seferColor;

  return (
    <div>
      <div
        className={`p-card${isCurrent ? ' is-current' : ''}${isComplete ? ' is-complete' : ''}${isExpanded ? ' is-expanded' : ''}${hasMissing && filterMissing ? ' has-missing' : ''}`}
        style={{'--sc': seferColor}}
        onClick={onExpand}
      >
        {isCurrent && <div className="now-badge">השבוע</div>}
        <div className="p-name">{name}</div>
        <div className="p-dots">
          {[1,2,3,4,5,6,7].map(i => {
            const d = dotLevel(i);
            return <div key={i} className={`p-dot d${d}`} title={`עליה ${i}: ${d}/3`} />;
          })}
        </div>
        <div className="p-bar">
          <div className="p-bar-fill" style={{ width: `${pct}%`, background: barColor }} />
        </div>
      </div>
      {isExpanded && (
        <AliyotPanel name={name} seferColor={seferColor} prog={prog} onToggle={onToggle} onBulk={onBulk} />
      )}
    </div>
  );
}

function SeferSection({ sefer, prog, currentParasha, expandedParasha, filterMissing, onExpand, onToggle, onBulk, defaultOpen }) {
  const [open, setOpen] = useState(defaultOpen);
  const { done, total } = seferStats(prog, sefer);
  const pct = Math.round(done / total * 100);

  const visibleParshiot = filterMissing
    ? sefer.parshiot.filter(name => parshaStats(prog, name).done < 21)
    : sefer.parshiot;

  if (filterMissing && visibleParshiot.length === 0) return null;

  return (
    <div className="sefer-section">
      <div className="sefer-hdr" onClick={() => setOpen(v => !v)}>
        <div className="sefer-dot" style={{ background: sefer.color }} />
        <span className="sefer-name" style={{ color: sefer.color }}>{sefer.name}</span>
        <span className="sefer-pct">{done}/{total} · {pct}%</span>
        <span className={`sefer-chevron${open ? ' open' : ''}`}>▾</span>
      </div>
      {open && (
        <>
          <div className="sefer-bar">
            <div className="sefer-bar-fill" style={{ width: `${pct}%`, background: sefer.color }} />
          </div>
          <div className="parasha-grid">
            {visibleParshiot.map(name => (
              <ParshaCard
                key={name} name={name} seferColor={sefer.color} prog={prog}
                isCurrent={currentParasha === name}
                isExpanded={expandedParasha === name}
                filterMissing={filterMissing}
                onExpand={() => onExpand(name)}
                onToggle={onToggle} onBulk={onBulk}
              />
            ))}
          </div>
        </>
      )}
    </div>
  );
}

function StatsBar({ prog }) {
  const s = globalStats(prog);
  const totalActions = 54 * 21;
  const totalDone = s.m1 + s.m2 + s.t;
  const pct = Math.round(totalDone / totalActions * 100);
  return (
    <div className="stats-bar">
      <div className="stat-item">
        <span className="stat-num" style={{ color: '#2a5ab8' }}>{s.m1}</span>
        <span className="stat-label">מקרא א׳</span>
      </div>
      <div className="stat-sep" />
      <div className="stat-item">
        <span className="stat-num" style={{ color: '#4a67c8' }}>{s.m2}</span>
        <span className="stat-label">מקרא ב׳</span>
      </div>
      <div className="stat-sep" />
      <div className="stat-item">
        <span className="stat-num" style={{ color: '#c4922a' }}>{s.t}</span>
        <span className="stat-label">תרגום</span>
      </div>
      <div className="stat-sep" />
      <div className="stat-item">
        <span className="stat-num" style={{ color: '#1a6b45' }}>{s.complete}</span>
        <span className="stat-label">שלמות</span>
      </div>
      <div className="stat-sep" />
      <div className="overall-bar">
        <div className="overall-bar-track">
          <div className="overall-bar-fill" style={{ width: `${pct}%` }} />
        </div>
        <div className="overall-label">{pct}% מהשנה הושלם</div>
      </div>
    </div>
  );
}

/* ═══ APP ════════════════════════════════════════════ */
function App() {
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);
  const [prog, setProg] = useState({});
  const [expanded, setExpanded] = useState(null);
  const [filterMissing, setFilterMissing] = useState(false);
  const saveTimer = useRef(null);
  const currentYear = useRef(getHebrewYear()).current;
  const currentParasha = useRef(detectCurrentParasha()).current;

  useEffect(() => {
    const { auth, onAuthStateChanged, getRedirectResult } = window._fb;
    getRedirectResult(auth).catch(() => {});
    return onAuthStateChanged(auth, async u => {
      setUser(u);
      if (u) {
        const remote = await fbLoad(u.uid);
        if (remote !== null) {
          setProg(remote);
        } else {
          try { const local = localStorage.getItem('mikra-prog'); if (local) setProg(JSON.parse(local)); } catch {}
        }
        document.title = 'שמו״ת · ' + (u.displayName?.split(' ')[0] || '');
      } else {
        setProg({});
        document.title = 'שניים מקרא ואחד תרגום';
      }
      setLoading(false);
    });
  }, []);

  function signIn() {
    const { auth, provider, signInWithPopup, signInWithRedirect } = window._fb;
    signInWithPopup(auth, provider).catch(err => {
      if (err.code === 'auth/popup-blocked' || err.code === 'auth/popup-closed-by-user') signInWithRedirect(auth, provider);
    });
  }

  function signOutUser() {
    const { auth, signOut } = window._fb;
    signOut(auth); setProg({}); setExpanded(null);
  }

  function save(updated) {
    try { localStorage.setItem('mikra-prog', JSON.stringify(updated)); } catch {}
    if (user) {
      clearTimeout(saveTimer.current);
      saveTimer.current = setTimeout(() => fbSave(user.uid, updated), 1200);
    }
  }

  function toggleAliya(parasha, num, field) {
    setProg(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      if (!next[parasha]) next[parasha] = {};
      if (!next[parasha][num]) next[parasha][num] = {};
      next[parasha][num][field] = !next[parasha][num][field];
      save(next);
      return next;
    });
  }

  function bulkMark(parasha, field, value) {
    setProg(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      if (!next[parasha]) next[parasha] = {};
      if (field === null) {
        // clear all
        next[parasha] = {};
      } else {
        for (let i = 1; i <= 7; i++) {
          if (!next[parasha][i]) next[parasha][i] = {};
          next[parasha][i][field] = value;
        }
      }
      save(next);
      return next;
    });
  }

  function handleExpand(name) {
    setExpanded(prev => prev === name ? null : name);
  }

  const { missing } = globalStats(prog);

  if (loading) return <div className="loading">טוען…</div>;

  if (!user) return (
    <div className="signin-wrap">
      <div className="signin-card">
        <div className="signin-icon">שמו״ת</div>
        <div className="signin-title">שניים מקרא ואחד תרגום</div>
        <div className="signin-desc">
          עקוב אחר קריאת הפרשה שלך —<br/>
          כל עליה, כל קריאה, לאורך כל השנה.<br/>
          לעולם לא תאבד את המקום.
        </div>
        <button className="signin-btn" onClick={signIn}>
          <svg className="g-icon" viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          כניסה עם חשבון Google
        </button>
      </div>
    </div>
  );

  return (
    <>
      <header className="app-header">
        <div className="header-brand">
          <span className="header-title">שמו״ת</span>
          <span className="header-sub">שניים מקרא ואחד תרגום</span>
        </div>
        <div className="header-actions">
          <span className="year-badge">{yearStr(currentYear)}</span>
          <button
            className={`missing-btn${filterMissing ? ' active' : ''}`}
            onClick={() => setFilterMissing(v => !v)}
            title="הצג רק פרשות עם חוסרים"
          >
            ⚠ {missing} חסרים
          </button>
          <div className="user-chip">
            {user.photoURL && <img src={user.photoURL} alt="" />}
            <span>{user.displayName?.split(' ')[0]}</span>
          </div>
          <button className="icon-btn" onClick={signOutUser} title="יציאה">↩</button>
        </div>
      </header>

      <StatsBar prog={prog} />

      <main className="main">
        {filterMissing && (
          <div className="filter-banner">
            <span>⚠ מציג פרשות עם עליות חסרות בלבד · {missing} פרשות</span>
            <button className="icon-btn" style={{color:'#8b2020'}} onClick={() => setFilterMissing(false)}>✕</button>
          </div>
        )}
        {SFARIM.map((sefer, idx) => (
          <SeferSection
            key={sefer.id}
            sefer={sefer}
            prog={prog}
            currentParasha={currentParasha}
            expandedParasha={expanded}
            filterMissing={filterMissing}
            onExpand={handleExpand}
            onToggle={toggleAliya}
            onBulk={bulkMark}
            defaultOpen={
              filterMissing
                ? sefer.parshiot.some(p => parshaStats(prog, p).done < 21)
                : sefer.parshiot.includes(currentParasha) || idx === 0
            }
          />
        ))}
      </main>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
